name: Generate Pac-Man Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: pacman-contribution-graph
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Check generated Pac-Man files
        id: pacman_files
        shell: bash
        run: |
          if [ -f dist/pacman-contribution-graph.svg ] && [ -f dist/pacman-contribution-graph-dark.svg ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Pac-Man generator did not create dist files. Keeping the existing output branch unchanged."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Push the generated SVG to the output branch
      - name: Push pacman-contribution-graph.svg to the output branch
        if: steps.pacman_files.outputs.present == 'true'
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
